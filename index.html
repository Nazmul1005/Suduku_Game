<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sudoku</title>
  <style>
    :root {
      --board-line: #344861;
      --board-thin: #bfc6d4;
      --cell-bg: #ffffff;
      --given: #1b2a4a;
      --user: #325aaf;
      --error: #e94b4b;
      --hl-region: #e2ebf3;
      --hl-same: #c3d7ea;
      --hl-selected: #a7c7f0;
      --accent: #325aaf;
      --accent-soft: #eaf0fb;
      --text-muted: #6e7c91;
      --bg: #f3f6fb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--bg);
      color: var(--given);
      padding: 20px 12px 40px;
      -webkit-user-select: none;
      user-select: none;
    }

    h1 {
      margin: 6px 0 2px;
      font-size: 1.9rem;
      font-weight: 800;
      letter-spacing: 0.5px;
      color: var(--given);
    }

    .subtitle {
      margin-bottom: 22px;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    /* ---------- Landing ---------- */
    .difficulty-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      margin-top: 8vh;
    }

    .difficulty-options {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .difficulty-card {
      width: 150px;
      padding: 26px 18px;
      background: #fff;
      border: 2px solid #e3e8f0;
      border-radius: 16px;
      color: var(--given);
      font-family: inherit;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(50, 90, 175, 0.08);
      transition: transform 0.15s, box-shadow 0.2s, border-color 0.2s;
    }

    .difficulty-card small {
      display: block;
      font-weight: 400;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 8px;
    }

    .difficulty-card:hover { transform: translateY(-4px); box-shadow: 0 12px 26px rgba(50, 90, 175, 0.16); }
    .difficulty-card.easy   { border-color: #37b26b; }
    .difficulty-card.medium { border-color: #f0a029; }
    .difficulty-card.hard   { border-color: #e94b4b; }
    .difficulty-card.expert { border-color: #8a4bd6; }

    /* ---------- Game ---------- */
    .game-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 500px;
    }

    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 460px;
      margin-bottom: 12px;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .info-bar .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .info-bar .label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.6px; }
    .info-bar .value { font-size: 1.05rem; font-weight: 700; color: var(--given); }
    .info-bar .value.mistake { color: var(--error); }

    #pauseBtn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.3rem;
      color: var(--text-muted);
      padding: 4px 8px;
      border-radius: 8px;
    }
    #pauseBtn:hover { background: var(--accent-soft); }

    .board-wrap {
      position: relative;
      width: min(92vw, 460px);
      height: min(92vw, 460px);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      grid-template-rows: repeat(9, 1fr);
      width: 100%;
      height: 100%;
      background: #fff;
      border: 3px solid var(--board-line);
      border-radius: 6px;
      overflow: hidden;
    }

    .cell {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: var(--cell-bg);
      color: var(--user);
      font-size: clamp(1.1rem, 5.5vw, 1.75rem);
      font-weight: 500;
      cursor: pointer;
      border-right: 1px solid var(--board-thin);
      border-bottom: 1px solid var(--board-thin);
      transition: background 0.1s;
    }

    .cell.given { color: var(--given); font-weight: 700; }
    .cell.error { color: var(--error); }
    .cell.hl-region { background: var(--hl-region); }
    .cell.hl-same   { background: var(--hl-same); }
    .cell.selected  { background: var(--hl-selected); }
    .cell.flash-bad { animation: flashBad 0.4s; }

    /* thick 3x3 separators */
    .cell:nth-child(9n) { border-right: none; }
    .cell:nth-child(3n):not(:nth-child(9n)) { border-right: 2px solid var(--board-line); }
    .board .cell:nth-child(n+19):nth-child(-n+27),
    .board .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 2px solid var(--board-line); }
    .board .cell:nth-child(n+73) { border-bottom: none; }

    /* pencil notes */
    .notes {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      width: 100%;
      height: 100%;
      padding: 2px;
    }
    .notes span {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(0.5rem, 2vw, 0.72rem);
      color: var(--text-muted);
      font-weight: 500;
      line-height: 1;
    }

    @keyframes flashBad {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-2px); }
      75% { transform: translateX(2px); }
    }

    .cell.flash-good { animation: flashGood 0.5s ease; }
    @keyframes flashGood {
      0%   { background: #b7f0cd; transform: scale(1); }
      40%  { background: #b7f0cd; transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    /* pause overlay */
    .pause-overlay {
      position: absolute;
      inset: 0;
      background: rgba(243, 246, 251, 0.97);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      border-radius: 6px;
      z-index: 5;
      color: var(--text-muted);
      font-size: 1.1rem;
      font-weight: 600;
    }
    .pause-overlay button {
      padding: 10px 26px;
      font-size: 1rem;
    }

    /* ---------- Action buttons ---------- */
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 18px;
      width: min(92vw, 460px);
      justify-content: space-between;
    }

    .action {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--accent);
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 6px 0;
      border-radius: 10px;
      position: relative;
    }
    .action:hover { background: var(--accent-soft); }
    .action:disabled { color: #c2c9d6; cursor: default; }
    .action:disabled:hover { background: none; }
    .action .icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--accent-soft);
      font-size: 1.2rem;
    }
    .action:disabled .icon { background: #f0f2f6; }
    .action.on .icon { background: var(--accent); color: #fff; }

    .badge {
      position: absolute;
      top: 0;
      right: 22%;
      background: var(--accent);
      color: #fff;
      font-size: 0.62rem;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 10px;
    }
    .action.on .badge { background: #37b26b; }

    /* ---------- Number pad ---------- */
    .numpad {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 6px;
      margin-top: 18px;
      width: min(92vw, 460px);
    }
    .num {
      position: relative;
      aspect-ratio: 1 / 1.25;
      background: #fff;
      border: 1px solid #e3e8f0;
      border-radius: 10px;
      color: var(--accent);
      font-size: clamp(1.1rem, 5vw, 1.7rem);
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(50, 90, 175, 0.07);
      transition: transform 0.08s, background 0.15s;
    }
    .num:hover { background: var(--accent-soft); }
    .num:active { transform: scale(0.94); }
    .num .remaining {
      position: absolute;
      bottom: 2px;
      left: 0;
      right: 0;
      font-size: 0.6rem;
      font-weight: 500;
      color: var(--text-muted);
    }
    .num.done { opacity: 0.35; pointer-events: none; }

    /* ---------- Footer controls ---------- */
    .footer {
      display: flex;
      gap: 12px;
      margin-top: 22px;
    }
    .btn {
      padding: 9px 20px;
      font-size: 0.9rem;
      border: 1px solid var(--accent);
      border-radius: 20px;
      background: #fff;
      color: var(--accent);
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: var(--accent-soft); }
    .btn.primary { background: var(--accent); color: #fff; }
    .btn.primary:hover { background: #274a94; }

    .message {
      margin-top: 16px;
      min-height: 22px;
      font-size: 1rem;
      font-weight: 600;
      text-align: center;
    }
    .message.win { color: #37b26b; }
    .message.error { color: var(--error); }

    /* ---------- Overlay modal (win / game over) ---------- */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(27, 42, 74, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      backdrop-filter: blur(3px);
    }
    .modal-box {
      background: #fff;
      border-radius: 18px;
      padding: 34px 30px;
      text-align: center;
      max-width: 340px;
      width: 86%;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    }
    .modal-box h2 { font-size: 1.6rem; margin-bottom: 8px; }
    .modal-box p { color: var(--text-muted); margin-bottom: 20px; font-weight: 500; }
    .modal-box .modal-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

    .hidden { display: none !important; }

    .landing-links { display: flex; gap: 12px; margin-top: 4px; }

    /* Login screen */
    .login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-top: 12vh;
      width: 100%;
      max-width: 360px;
    }
    .login-form { display: flex; gap: 10px; width: 100%; }
    .login-form input {
      flex: 1;
      padding: 12px 16px;
      font-size: 1rem;
      font-family: inherit;
      border: 2px solid #e3e8f0;
      border-radius: 12px;
      background: #fff;
      color: var(--given);
      outline: none;
    }
    .login-form input:focus { border-color: var(--accent); }
    .profile-list { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; width: 100%; }
    .profile-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: #fff;
      border: 1px solid #e3e8f0;
      border-radius: 20px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--given);
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(50, 90, 175, 0.06);
      transition: transform 0.12s, border-color 0.2s;
    }
    .profile-chip:hover { transform: translateY(-2px); border-color: var(--accent); }
    .profile-chip .del {
      border: none;
      background: none;
      color: var(--text-muted);
      font-size: 1rem;
      cursor: pointer;
      line-height: 1;
      padding: 0 2px;
    }
    .profile-chip .del:hover { color: var(--error); }

    /* User bar on landing */
    .user-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #fff;
      padding: 8px 16px;
      border-radius: 24px;
      box-shadow: 0 4px 14px rgba(50, 90, 175, 0.08);
      font-size: 0.95rem;
      color: var(--given);
    }
    .btn.small { padding: 5px 14px; font-size: 0.78rem; }

    .dash-user { text-align: center; color: var(--text-muted); font-weight: 600; margin-bottom: 14px; }

    .modal-box.wide { max-width: 400px; text-align: left; }
    .modal-box.wide h2 { text-align: center; }

    /* Settings */
    .setting-list { display: flex; flex-direction: column; gap: 4px; margin: 8px 0 14px; }
    .setting {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 4px;
      border-bottom: 1px solid #eef1f6;
      font-size: 0.92rem;
      font-weight: 500;
      color: var(--given);
      cursor: pointer;
    }
    .setting:last-child { border-bottom: none; }
    .setting select {
      font-family: inherit;
      font-size: 0.88rem;
      padding: 5px 8px;
      border: 1px solid #d8deea;
      border-radius: 8px;
      background: #fff;
      color: var(--given);
      cursor: pointer;
    }
    .setting input[type="checkbox"] {
      width: 20px; height: 20px; cursor: pointer; accent-color: var(--accent);
    }
    .setting-note { font-size: 0.78rem; color: var(--text-muted); text-align: center; margin-bottom: 16px; }

    .btn.danger { border-color: var(--error); color: var(--error); }
    .btn.danger:hover { background: #fdecec; }

    /* Dashboard */
    .dash-overall {
      display: flex;
      justify-content: space-around;
      gap: 8px;
      margin: 6px 0 18px;
    }
    .dash-overall .box {
      flex: 1;
      background: var(--accent-soft);
      border-radius: 12px;
      padding: 14px 6px;
      text-align: center;
    }
    .dash-overall .box .n { font-size: 1.5rem; font-weight: 800; color: var(--accent); }
    .dash-overall .box .l { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-top: 2px; }

    .dash-table { width: 100%; border-collapse: collapse; margin-bottom: 18px; font-size: 0.85rem; }
    .dash-table th, .dash-table td { padding: 8px 6px; text-align: center; }
    .dash-table th { color: var(--text-muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #eef1f6; }
    .dash-table td { border-bottom: 1px solid #f2f4f8; color: var(--given); font-weight: 500; }
    .dash-table td:first-child { text-align: left; font-weight: 700; }
    .dash-table .winrate { font-weight: 700; color: #37b26b; }

    /* ---------- Dark mode ---------- */
    body.dark {
      --board-line: #8a97ad;
      --board-thin: #3a4152;
      --cell-bg: #262b35;
      --given: #e8ecf3;
      --user: #7aa2e3;
      --error: #ff6b6b;
      --hl-region: #333a47;
      --hl-same: #3d4a5f;
      --hl-selected: #42597f;
      --accent: #5b82d6;
      --accent-soft: #2e3547;
      --text-muted: #9aa6b8;
      --bg: #1b1f27;
    }
    body.dark .difficulty-card,
    body.dark .num,
    body.dark .btn,
    body.dark .modal-box,
    body.dark .board,
    body.dark .setting select,
    body.dark .login-form input,
    body.dark .profile-chip,
    body.dark .user-bar { background: #262b35; }
    body.dark .login-form input,
    body.dark .profile-chip { border-color: #3a4152; }
    body.dark .num { border-color: #3a4152; }
    body.dark .difficulty-card { border-color: #3a4152; }
    body.dark .setting { border-color: #333a47; }
    body.dark .dash-table th { border-color: #333a47; }
    body.dark .dash-table td { border-color: #2b313c; }
    body.dark .btn.danger:hover { background: #3a2b2b; }
  </style>
</head>
<body>
  <h1>Sudoku</h1>

  <!-- Login -->
  <div id="loginScreen" class="login-screen">
    <p class="subtitle">Enter a nickname to save your progress.</p>
    <form id="loginForm" class="login-form" autocomplete="off">
      <input id="nicknameInput" type="text" maxlength="16" placeholder="Your nickname" />
      <button type="submit" class="btn primary">Start Playing</button>
    </form>
    <div id="profileList" class="profile-list"></div>
  </div>

  <!-- Landing -->
  <div id="landing" class="difficulty-screen hidden">
    <div class="user-bar">
      <span>👤 <strong id="currentUserName"></strong></span>
      <button class="btn small" id="switchUser">Switch User</button>
    </div>
    <p class="subtitle">Select a difficulty to begin.</p>
    <div class="difficulty-options">
      <button class="difficulty-card easy"   data-diff="Easy">Easy<small>Relaxed start</small></button>
      <button class="difficulty-card medium" data-diff="Medium">Medium<small>A fair test</small></button>
      <button class="difficulty-card hard"   data-diff="Hard">Hard<small>Stay sharp</small></button>
      <button class="difficulty-card expert" data-diff="Expert">Expert<small>Few clues</small></button>
    </div>
    <div class="landing-links">
      <button class="btn" id="openDashboard">📊 Dashboard</button>
      <button class="btn" id="openSettings">⚙️ Settings</button>
    </div>
  </div>

  <!-- Game -->
  <div id="gameScreen" class="game-screen hidden">
    <div class="info-bar">
      <div class="stat"><span class="label">Level</span><span class="value" id="difficulty">Easy</span></div>
      <div class="stat"><span class="label">Mistakes</span><span class="value mistake" id="mistakes">0 / 3</span></div>
      <div class="stat"><span class="label">Time</span><span class="value" id="timer">00:00</span></div>
      <button id="pauseBtn" title="Pause">⏸</button>
    </div>

    <div class="board-wrap">
      <div class="board" id="board"></div>
      <div class="pause-overlay hidden" id="pauseOverlay">
        <div>⏸ Paused</div>
        <button class="btn primary" id="resumeBtn">Resume</button>
      </div>
    </div>

    <div class="actions">
      <button class="action" id="undoBtn"><span class="icon">↶</span>Undo</button>
      <button class="action" id="eraseBtn"><span class="icon">⌫</span>Erase</button>
      <button class="action" id="notesBtn"><span class="icon">✎</span>Notes<span class="badge" id="notesBadge">Off</span></button>
      <button class="action" id="hintBtn"><span class="icon">💡</span>Hint<span class="badge" id="hintBadge">3</span></button>
    </div>

    <div class="numpad" id="numpad"></div>

    <div class="footer">
      <button class="btn" id="backToMenu">Change Level</button>
      <button class="btn primary" id="newGame">New Game</button>
    </div>

    <div class="message" id="message"></div>
  </div>

  <!-- End modal -->
  <div class="modal hidden" id="modal">
    <div class="modal-box">
      <h2 id="modalTitle"></h2>
      <p id="modalText"></p>
      <div class="modal-actions">
        <button class="btn" id="modalMenu">Change Level</button>
        <button class="btn primary" id="modalNew">New Game</button>
      </div>
    </div>
  </div>

  <!-- Settings modal -->
  <div class="modal hidden" id="settingsModal">
    <div class="modal-box wide">
      <h2>⚙️ Settings</h2>
      <div class="setting-list">
        <label class="setting">
          <span>Mistakes allowed</span>
          <select id="setMistakes">
            <option value="3">3</option>
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="0">Unlimited</option>
          </select>
        </label>
        <label class="setting">
          <span>Hints per game</span>
          <select id="setHints">
            <option value="0">0</option>
            <option value="3">3</option>
            <option value="5">5</option>
            <option value="99">Unlimited</option>
          </select>
        </label>
        <label class="setting">
          <span>Auto-complete when few cells remain</span>
          <select id="setAutoComplete">
            <option value="0">Off</option>
            <option value="3">Last 3 cells</option>
            <option value="5">Last 5 cells</option>
            <option value="10">Last 10 cells</option>
          </select>
        </label>
        <label class="setting">
          <span>Highlight row / column / box</span>
          <input type="checkbox" id="setRegion" />
        </label>
        <label class="setting">
          <span>Highlight matching numbers</span>
          <input type="checkbox" id="setSame" />
        </label>
        <label class="setting">
          <span>Auto-clear notes on placement</span>
          <input type="checkbox" id="setAutoNotes" />
        </label>
        <label class="setting">
          <span>Show timer</span>
          <input type="checkbox" id="setTimer" />
        </label>
        <label class="setting">
          <span>Dark mode</span>
          <input type="checkbox" id="setDark" />
        </label>
      </div>
      <p class="setting-note">Changes apply to your next new game.</p>
      <div class="modal-actions">
        <button class="btn" id="settingsClose">Done</button>
      </div>
    </div>
  </div>

  <!-- Dashboard modal -->
  <div class="modal hidden" id="dashboardModal">
    <div class="modal-box wide">
      <h2>📊 Dashboard</h2>
      <p class="dash-user" id="dashUser"></p>
    <div class="dash-overall" id="dashOverall"></div>
      <table class="dash-table" id="dashTable"></table>
      <div class="modal-actions">
        <button class="btn danger" id="dashReset">Reset Stats</button>
        <button class="btn primary" id="dashClose">Close</button>
      </div>
    </div>
  </div>

  <script>
    const SIZE = 9;
    const BOX = 3;

    /* ---------- Settings & stats (persisted) ---------- */
    const STORAGE_SETTINGS = 'sudoku_settings';
    const STORAGE_USERS = 'sudoku_users';
    const STORAGE_CURRENT = 'sudoku_current';
    const DIFFS = ['Easy', 'Medium', 'Hard', 'Expert'];

    const DEFAULT_SETTINGS = {
      maxMistakes: 3,      // 0 = unlimited
      maxHints: 3,
      autoCompleteAt: 3,   // auto-fill when this many empty cells remain (0 = off)
      highlightRegion: true,
      highlightSame: true,
      autoClearNotes: true,
      showTimer: true,
      darkMode: false
    };

    function loadSettings() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_SETTINGS));
        return { ...DEFAULT_SETTINGS, ...(saved || {}) };
      } catch { return { ...DEFAULT_SETTINGS }; }
    }
    function saveSettings() {
      try { localStorage.setItem(STORAGE_SETTINGS, JSON.stringify(settings)); } catch {}
    }

    function blankStats() {
      const s = {};
      DIFFS.forEach(d => s[d] = { played: 0, wins: 0, losses: 0, bestTime: null });
      return s;
    }
    function normalizeStats(saved) {
      const base = blankStats();
      if (saved) DIFFS.forEach(d => { if (saved[d]) base[d] = { ...base[d], ...saved[d] }; });
      return base;
    }

    // Users: { [nickname]: statsObject }
    function loadUsers() {
      try { return JSON.parse(localStorage.getItem(STORAGE_USERS)) || {}; }
      catch { return {}; }
    }
    function saveUsers() {
      try { localStorage.setItem(STORAGE_USERS, JSON.stringify(users)); } catch {}
    }
    function saveStats() {
      if (!currentUser) return;
      users[currentUser] = stats;
      saveUsers();
    }

    let settings = loadSettings();
    let users = loadUsers();
    let currentUser = null;
    let stats = blankStats();

    const boardEl = document.getElementById('board');
    const numpadEl = document.getElementById('numpad');
    const msgEl = document.getElementById('message');
    const mistakesEl = document.getElementById('mistakes');
    const difficultyEl = document.getElementById('difficulty');
    const timerEl = document.getElementById('timer');
    const landingEl = document.getElementById('landing');
    const gameScreenEl = document.getElementById('gameScreen');
    const pauseBtn = document.getElementById('pauseBtn');
    const pauseOverlay = document.getElementById('pauseOverlay');
    const notesBtn = document.getElementById('notesBtn');
    const notesBadge = document.getElementById('notesBadge');
    const hintBtn = document.getElementById('hintBtn');
    const hintBadge = document.getElementById('hintBadge');
    const undoBtn = document.getElementById('undoBtn');
    const modal = document.getElementById('modal');
    const timerStatEl = timerEl.closest('.stat');
    const settingsModal = document.getElementById('settingsModal');
    const dashboardModal = document.getElementById('dashboardModal');
    const loginScreen = document.getElementById('loginScreen');
    const loginForm = document.getElementById('loginForm');
    const nicknameInput = document.getElementById('nicknameInput');
    const profileList = document.getElementById('profileList');
    const currentUserName = document.getElementById('currentUserName');

    const DIFFICULTY_LEVELS = { Easy: 45, Medium: 34, Hard: 28, Expert: 24 };

    let solution = [];
    let puzzle = [];        // starting givens (0 = empty)
    let cells = [];         // per-cell state: { value, given, notes:Set, el }
    let mistakes = 0;
    let hintsLeft = settings.maxHints;
    let notesMode = false;
    let locked = false;
    let paused = false;
    let selected = null;    // index 0..80
    let timerId = null;
    let seconds = 0;
    let currentDifficulty = 'Easy';
    let history = [];       // undo stack
    let recorded = false;   // whether current game already counted in stats

    /* ---------- Generation ---------- */
    function shuffle(a) {
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function canPlace(grid, r, c, v) {
      for (let i = 0; i < SIZE; i++) {
        if (grid[r][i] === v || grid[i][c] === v) return false;
      }
      const br = Math.floor(r / BOX) * BOX, bc = Math.floor(c / BOX) * BOX;
      for (let i = 0; i < BOX; i++)
        for (let j = 0; j < BOX; j++)
          if (grid[br + i][bc + j] === v) return false;
      return true;
    }

    function fillFull(grid) {
      for (let r = 0; r < SIZE; r++)
        for (let c = 0; c < SIZE; c++)
          if (grid[r][c] === 0) {
            for (const v of shuffle([1,2,3,4,5,6,7,8,9])) {
              if (canPlace(grid, r, c, v)) {
                grid[r][c] = v;
                if (fillFull(grid)) return true;
                grid[r][c] = 0;
              }
            }
            return false;
          }
      return true;
    }

    function countSolutions(grid, cap) {
      let count = 0;
      (function bt() {
        for (let r = 0; r < SIZE; r++)
          for (let c = 0; c < SIZE; c++)
            if (grid[r][c] === 0) {
              for (let v = 1; v <= SIZE; v++)
                if (canPlace(grid, r, c, v)) {
                  grid[r][c] = v; bt(); grid[r][c] = 0;
                  if (count >= cap) return;
                }
              return;
            }
        count++;
      })();
      return count;
    }

    function buildSolution() {
      const g = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
      fillFull(g);
      return g;
    }

    function buildPuzzle(sol, given) {
      const p = sol.map(row => row.slice());
      const positions = shuffle(
        Array.from({ length: 81 }, (_, i) => [Math.floor(i / 9), i % 9])
      );
      let remaining = 81;
      for (const [r, c] of positions) {
        if (remaining <= given) break;
        const saved = p[r][c];
        p[r][c] = 0;
        if (countSolutions(p.map(row => row.slice()), 2) !== 1) {
          p[r][c] = saved;
        } else {
          remaining--;
        }
      }
      return p;
    }

    /* ---------- Game flow ---------- */
    function startGame(diff) {
      currentDifficulty = diff;
      solution = buildSolution();
      puzzle = buildPuzzle(solution, DIFFICULTY_LEVELS[diff]);
      mistakes = 0;
      hintsLeft = settings.maxHints;
      notesMode = false;
      locked = false;
      paused = false;
      selected = null;
      history = [];
      recorded = false;

      cells = [];
      for (let r = 0; r < SIZE; r++)
        for (let c = 0; c < SIZE; c++) {
          const given = puzzle[r][c] !== 0;
          cells.push({ value: given ? puzzle[r][c] : 0, given, notes: new Set(), el: null });
        }

      difficultyEl.textContent = diff;
      mistakesEl.textContent = mistakesLabel();
      hintBadge.textContent = settings.maxHints >= 99 ? '∞' : hintsLeft;
      hintBtn.disabled = settings.maxHints <= 0;
      notesBadge.textContent = 'Off';
      notesBtn.classList.remove('on');
      pauseOverlay.classList.add('hidden');
      setMessage('');
      modal.classList.add('hidden');
      applySettings();

      renderBoard();
      renderNumpad();
      updateUndoBtn();
      startTimer();

      landingEl.classList.add('hidden');
      gameScreenEl.classList.remove('hidden');
    }

    function backToMenu() {
      stopTimer();
      modal.classList.add('hidden');
      landingEl.classList.remove('hidden');
      gameScreenEl.classList.add('hidden');
    }

    /* ---------- Render ---------- */
    function renderBoard() {
      boardEl.innerHTML = '';
      cells.forEach((cell, i) => {
        const el = document.createElement('div');
        el.className = 'cell';
        el.dataset.index = i;
        cell.el = el;
        el.addEventListener('click', () => selectCell(i));
        boardEl.appendChild(el);
      });
      drawAll();
    }

    function renderNumpad() {
      numpadEl.innerHTML = '';
      for (let n = 1; n <= 9; n++) {
        const b = document.createElement('button');
        b.className = 'num';
        b.dataset.n = n;
        b.innerHTML = `${n}<span class="remaining"></span>`;
        b.addEventListener('click', () => inputNumber(n));
        numpadEl.appendChild(b);
      }
      updateNumpadCounts();
    }

    function drawCell(i) {
      const cell = cells[i];
      const el = cell.el;
      el.classList.remove('given', 'error', 'selected', 'hl-region', 'hl-same');

      if (cell.given) el.classList.add('given');

      if (cell.value !== 0) {
        el.textContent = cell.value;
        if (!cell.given && cell.value !== solution[Math.floor(i/9)][i%9]) {
          el.classList.add('error');
        }
      } else if (cell.notes.size) {
        const notes = document.createElement('div');
        notes.className = 'notes';
        for (let n = 1; n <= 9; n++) {
          const s = document.createElement('span');
          s.textContent = cell.notes.has(n) ? n : '';
          notes.appendChild(s);
        }
        el.textContent = '';
        el.appendChild(notes);
      } else {
        el.textContent = '';
      }
    }

    function drawAll() {
      for (let i = 0; i < 81; i++) drawCell(i);
      applyHighlights();
    }

    function applyHighlights() {
      cells.forEach(c => c.el.classList.remove('selected', 'hl-region', 'hl-same'));
      if (selected === null) return;
      const r = Math.floor(selected / 9), c = selected % 9;
      const br = Math.floor(r / BOX) * BOX, bc = Math.floor(c / BOX) * BOX;
      const selVal = cells[selected].value;
      cells.forEach((cell, i) => {
        const cr = Math.floor(i / 9), cc = i % 9;
        const inRegion = cr === r || cc === c ||
          (cr >= br && cr < br + BOX && cc >= bc && cc < bc + BOX);
        if (settings.highlightRegion && inRegion) cell.el.classList.add('hl-region');
        if (settings.highlightSame && selVal !== 0 && cell.value === selVal) cell.el.classList.add('hl-same');
      });
      cells[selected].el.classList.add('selected');
    }

    function updateNumpadCounts() {
      const counts = Array(10).fill(0);
      cells.forEach(c => { if (c.value !== 0) counts[c.value]++; });
      numpadEl.querySelectorAll('.num').forEach(b => {
        const n = +b.dataset.n;
        const left = 9 - counts[n];
        b.querySelector('.remaining').textContent = left > 0 ? left : '';
        b.classList.toggle('done', left <= 0);
      });
    }

    /* ---------- Interaction ---------- */
    function selectCell(i) {
      if (locked || paused) return;
      selected = i;
      applyHighlights();
    }

    function inputNumber(n) {
      if (locked || paused || selected === null) return;
      const cell = cells[selected];
      if (cell.given) return;

      if (notesMode) {
        if (cell.value !== 0) return;
        pushHistory();
        if (cell.notes.has(n)) cell.notes.delete(n);
        else cell.notes.add(n);
        drawCell(selected);
        applyHighlights();
        updateUndoBtn();
        return;
      }

      // toggle off if same value
      if (cell.value === n) return;

      pushHistory();
      cell.value = n;
      cell.notes.clear();

      const correct = solution[Math.floor(selected/9)][selected%9];
      if (n !== correct) {
        mistakes++;
        mistakesEl.textContent = mistakesLabel();
        cell.el.classList.add('flash-bad');
        setTimeout(() => cell.el.classList.remove('flash-bad'), 400);
        if (settings.maxMistakes > 0 && mistakes >= settings.maxMistakes) {
          drawAll();
          updateNumpadCounts();
          updateUndoBtn();
          return gameOver();
        }
      } else if (settings.autoClearNotes) {
        clearNotesInPeers(selected, n);
      }

      drawAll();
      updateNumpadCounts();
      updateUndoBtn();
      maybeAutoComplete();
      checkWin();
    }

    function clearNotesInPeers(index, n) {
      const r = Math.floor(index / 9), c = index % 9;
      const br = Math.floor(r / BOX) * BOX, bc = Math.floor(c / BOX) * BOX;
      cells.forEach((cell, i) => {
        const cr = Math.floor(i / 9), cc = i % 9;
        const peer = cr === r || cc === c ||
          (cr >= br && cr < br + BOX && cc >= bc && cc < bc + BOX);
        if (peer && cell.notes.has(n)) { cell.notes.delete(n); drawCell(i); }
      });
    }

    function eraseCell() {
      if (locked || paused || selected === null) return;
      const cell = cells[selected];
      if (cell.given || (cell.value === 0 && cell.notes.size === 0)) return;
      pushHistory();
      cell.value = 0;
      cell.notes.clear();
      drawAll();
      updateNumpadCounts();
      updateUndoBtn();
    }

    function useHint() {
      if (locked || paused || hintsLeft <= 0) return;
      // Prefer selected empty cell, else first empty
      let target = (selected !== null && cells[selected].value === 0 && !cells[selected].given)
        ? selected : -1;
      if (target === -1) target = cells.findIndex(c => c.value === 0 && !c.given);
      if (target === -1) return;

      pushHistory();
      const correct = solution[Math.floor(target/9)][target%9];
      cells[target].value = correct;
      cells[target].notes.clear();
      cells[target].given = true; // lock the hint so it can't be miscounted as error
      clearNotesInPeers(target, correct);
      selected = target;
      hintsLeft--;
      if (settings.maxHints >= 99) {
        hintBadge.textContent = '∞';
      } else {
        hintBadge.textContent = hintsLeft;
        if (hintsLeft <= 0) hintBtn.disabled = true;
      }
      drawAll();
      updateNumpadCounts();
      updateUndoBtn();
      maybeAutoComplete();
      checkWin();
    }

    function toggleNotes() {
      if (locked || paused) return;
      notesMode = !notesMode;
      notesBtn.classList.toggle('on', notesMode);
      notesBadge.textContent = notesMode ? 'On' : 'Off';
    }

    /* ---------- Undo ---------- */
    function pushHistory() {
      history.push(cells.map(c => ({ value: c.value, given: c.given, notes: new Set(c.notes) })));
      if (history.length > 100) history.shift();
    }

    function undo() {
      if (locked || paused || history.length === 0) return;
      const prev = history.pop();
      prev.forEach((s, i) => {
        cells[i].value = s.value;
        cells[i].given = s.given;
        cells[i].notes = new Set(s.notes);
      });
      drawAll();
      updateNumpadCounts();
      updateUndoBtn();
    }

    function updateUndoBtn() {
      undoBtn.disabled = history.length === 0;
    }

    /* ---------- Win / lose ---------- */
    function maybeAutoComplete() {
      const at = settings.autoCompleteAt;
      if (!at || locked) return;
      const empties = [];
      let anyWrong = false;
      cells.forEach((c, i) => {
        const correct = solution[Math.floor(i / 9)][i % 9];
        if (c.value === 0) empties.push(i);
        else if (c.value !== correct) anyWrong = true;
      });
      // Only auto-complete a clean board that's near the finish
      if (anyWrong || empties.length === 0 || empties.length > at) return;
      empties.forEach(i => {
        cells[i].value = solution[Math.floor(i / 9)][i % 9];
        cells[i].notes.clear();
        cells[i].el.classList.add('flash-good');
        setTimeout(() => cells[i].el.classList.remove('flash-good'), 500);
      });
      drawAll();
      updateNumpadCounts();
    }

    function checkWin() {
      if (locked) return;
      const solved = cells.every((c, i) => c.value === solution[Math.floor(i/9)][i%9]);
      if (!solved) return;
      locked = true;
      stopTimer();
      recordResult(true);
      showModal('🎉 Puzzle Solved!', `You finished ${currentDifficulty} in ${timerEl.textContent} with ${mistakes} mistake${mistakes === 1 ? '' : 's'}.`);
    }

    function gameOver() {
      locked = true;
      stopTimer();
      recordResult(false);
      // reveal solution
      cells.forEach((c, i) => {
        if (!c.given && c.value === 0) { c.value = solution[Math.floor(i/9)][i%9]; }
        drawCell(i);
      });
      const limit = settings.maxMistakes;
      showModal('Game Over', `You reached ${limit} mistake${limit === 1 ? '' : 's'}. The solution is shown on the board.`);
    }

    function recordResult(won) {
      if (recorded) return;
      recorded = true;
      const s = stats[currentDifficulty];
      s.played++;
      if (won) {
        s.wins++;
        if (s.bestTime === null || seconds < s.bestTime) s.bestTime = seconds;
      } else {
        s.losses++;
      }
      saveStats();
    }

    function showModal(title, text) {
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalText').textContent = text;
      modal.classList.remove('hidden');
    }

    /* ---------- Timer / pause ---------- */
    function startTimer() {
      stopTimer();
      seconds = 0;
      timerEl.textContent = '00:00';
      timerId = setInterval(() => {
        seconds++;
        const m = String(Math.floor(seconds / 60)).padStart(2, '0');
        const s = String(seconds % 60).padStart(2, '0');
        timerEl.textContent = `${m}:${s}`;
      }, 1000);
    }
    function stopTimer() { if (timerId) { clearInterval(timerId); timerId = null; } }

    function togglePause() {
      if (locked) return;
      paused = !paused;
      if (paused) { stopTimer(); pauseOverlay.classList.remove('hidden'); pauseBtn.textContent = '▶'; }
      else { startTimerResume(); pauseOverlay.classList.add('hidden'); pauseBtn.textContent = '⏸'; }
    }
    function startTimerResume() {
      stopTimer();
      timerId = setInterval(() => {
        seconds++;
        const m = String(Math.floor(seconds / 60)).padStart(2, '0');
        const s = String(seconds % 60).padStart(2, '0');
        timerEl.textContent = `${m}:${s}`;
      }, 1000);
    }

    function setMessage(text, cls = '') {
      msgEl.textContent = text;
      msgEl.className = 'message ' + cls;
    }

    function mistakesLabel() {
      return settings.maxMistakes === 0
        ? `${mistakes}`
        : `${mistakes} / ${settings.maxMistakes}`;
    }

    function applySettings() {
      document.body.classList.toggle('dark', settings.darkMode);
      timerStatEl.style.visibility = settings.showTimer ? 'visible' : 'hidden';
    }

    /* ---------- Keyboard ---------- */
    document.addEventListener('keydown', (e) => {
      if (gameScreenEl.classList.contains('hidden')) return;
      if (/^[1-9]$/.test(e.key)) { inputNumber(+e.key); return; }
      if (e.key === 'Backspace' || e.key === 'Delete' || e.key === '0') { eraseCell(); return; }
      if (e.key === 'n' || e.key === 'N') { toggleNotes(); return; }
      if (e.key === 'h' || e.key === 'H') { useHint(); return; }
      if (selected !== null && e.key.startsWith('Arrow')) {
        e.preventDefault();
        let r = Math.floor(selected / 9), c = selected % 9;
        if (e.key === 'ArrowUp') r = Math.max(0, r - 1);
        if (e.key === 'ArrowDown') r = Math.min(8, r + 1);
        if (e.key === 'ArrowLeft') c = Math.max(0, c - 1);
        if (e.key === 'ArrowRight') c = Math.min(8, c + 1);
        selectCell(r * 9 + c);
      }
    });

    /* ---------- Settings panel ---------- */
    function syncSettingsForm() {
      document.getElementById('setMistakes').value = String(settings.maxMistakes);
      document.getElementById('setHints').value = String(settings.maxHints);
      document.getElementById('setAutoComplete').value = String(settings.autoCompleteAt);
      document.getElementById('setRegion').checked = settings.highlightRegion;
      document.getElementById('setSame').checked = settings.highlightSame;
      document.getElementById('setAutoNotes').checked = settings.autoClearNotes;
      document.getElementById('setTimer').checked = settings.showTimer;
      document.getElementById('setDark').checked = settings.darkMode;
    }
    function readSettingsForm() {
      settings.maxMistakes = parseInt(document.getElementById('setMistakes').value, 10);
      settings.maxHints = parseInt(document.getElementById('setHints').value, 10);
      settings.autoCompleteAt = parseInt(document.getElementById('setAutoComplete').value, 10);
      settings.highlightRegion = document.getElementById('setRegion').checked;
      settings.highlightSame = document.getElementById('setSame').checked;
      settings.autoClearNotes = document.getElementById('setAutoNotes').checked;
      settings.showTimer = document.getElementById('setTimer').checked;
      settings.darkMode = document.getElementById('setDark').checked;
      saveSettings();
      applySettings();
      if (!gameScreenEl.classList.contains('hidden')) applyHighlights();
    }
    function openSettings() { syncSettingsForm(); settingsModal.classList.remove('hidden'); }
    function closeSettings() { settingsModal.classList.add('hidden'); }

    /* ---------- Dashboard ---------- */
    function formatTime(sec) {
      if (sec === null || sec === undefined) return '—';
      const m = String(Math.floor(sec / 60)).padStart(2, '0');
      const s = String(sec % 60).padStart(2, '0');
      return `${m}:${s}`;
    }
    function renderDashboard() {
      document.getElementById('dashUser').textContent = currentUser ? `Player: ${currentUser}` : '';
      let played = 0, wins = 0, losses = 0;
      DIFFS.forEach(d => { played += stats[d].played; wins += stats[d].wins; losses += stats[d].losses; });
      const winRate = played ? Math.round((wins / played) * 100) : 0;
      document.getElementById('dashOverall').innerHTML = `
        <div class="box"><div class="n">${played}</div><div class="l">Played</div></div>
        <div class="box"><div class="n">${wins}</div><div class="l">Wins</div></div>
        <div class="box"><div class="n">${losses}</div><div class="l">Losses</div></div>
        <div class="box"><div class="n">${winRate}%</div><div class="l">Win Rate</div></div>`;
      let rows = `<tr><th>Level</th><th>Played</th><th>Won</th><th>Lost</th><th>Win %</th><th>Best</th></tr>`;
      DIFFS.forEach(d => {
        const s = stats[d];
        const wr = s.played ? Math.round((s.wins / s.played) * 100) : 0;
        rows += `<tr><td>${d}</td><td>${s.played}</td><td>${s.wins}</td><td>${s.losses}</td>` +
                `<td class="winrate">${wr}%</td><td>${formatTime(s.bestTime)}</td></tr>`;
      });
      document.getElementById('dashTable').innerHTML = rows;
    }
    function openDashboard() { renderDashboard(); dashboardModal.classList.remove('hidden'); }
    function closeDashboard() { dashboardModal.classList.add('hidden'); }
    function resetStats() {
      if (!confirm('Reset all your stats? This cannot be undone.')) return;
      stats = blankStats();
      saveStats();
      renderDashboard();
    }

    /* ---------- Login / profiles ---------- */
    function renderProfiles() {
      const names = Object.keys(users);
      profileList.innerHTML = names.length ? '<p class="subtitle" style="width:100%;text-align:center;margin:0">or continue as</p>' : '';
      names.forEach(name => {
        const chip = document.createElement('div');
        chip.className = 'profile-chip';
        chip.innerHTML = `<span>👤 ${escapeHtml(name)}</span>`;
        chip.addEventListener('click', () => login(name));
        const del = document.createElement('button');
        del.className = 'del';
        del.textContent = '✕';
        del.title = 'Delete profile';
        del.addEventListener('click', (e) => { e.stopPropagation(); deleteProfile(name); });
        chip.appendChild(del);
        profileList.appendChild(chip);
      });
    }

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, c =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    function login(name) {
      name = name.trim();
      if (!name) return;
      currentUser = name;
      if (!users[name]) users[name] = blankStats();
      stats = normalizeStats(users[name]);
      users[name] = stats;
      saveUsers();
      try { localStorage.setItem(STORAGE_CURRENT, name); } catch {}
      currentUserName.textContent = name;
      showLanding();
    }

    function switchUser() {
      stopTimer();
      currentUser = null;
      try { localStorage.removeItem(STORAGE_CURRENT); } catch {}
      nicknameInput.value = '';
      showLogin();
    }

    function deleteProfile(name) {
      if (!confirm(`Delete profile "${name}" and its stats?`)) return;
      delete users[name];
      saveUsers();
      renderProfiles();
    }

    function showLogin() {
      loginScreen.classList.remove('hidden');
      landingEl.classList.add('hidden');
      gameScreenEl.classList.add('hidden');
      renderProfiles();
      nicknameInput.focus();
    }

    function showLanding() {
      loginScreen.classList.add('hidden');
      gameScreenEl.classList.add('hidden');
      landingEl.classList.remove('hidden');
    }

    /* ---------- Wire up ---------- */
    document.getElementById('eraseBtn').addEventListener('click', eraseCell);
    document.getElementById('hintBtn').addEventListener('click', useHint);
    document.getElementById('undoBtn').addEventListener('click', undo);
    notesBtn.addEventListener('click', toggleNotes);
    pauseBtn.addEventListener('click', togglePause);
    document.getElementById('resumeBtn').addEventListener('click', togglePause);
    document.getElementById('newGame').addEventListener('click', () => startGame(currentDifficulty));
    document.getElementById('backToMenu').addEventListener('click', backToMenu);
    document.getElementById('modalNew').addEventListener('click', () => startGame(currentDifficulty));
    document.getElementById('modalMenu').addEventListener('click', backToMenu);
    document.querySelectorAll('.difficulty-card').forEach(btn =>
      btn.addEventListener('click', () => startGame(btn.dataset.diff))
    );

    // Settings + Dashboard buttons
    document.getElementById('openSettings').addEventListener('click', openSettings);
    document.getElementById('settingsClose').addEventListener('click', closeSettings);
    document.getElementById('openDashboard').addEventListener('click', openDashboard);
    document.getElementById('dashClose').addEventListener('click', closeDashboard);
    document.getElementById('dashReset').addEventListener('click', resetStats);
    ['setMistakes','setHints','setAutoComplete','setRegion','setSame','setAutoNotes','setTimer','setDark']
      .forEach(id => document.getElementById(id).addEventListener('change', readSettingsForm));

    // Login wiring
    loginForm.addEventListener('submit', (e) => { e.preventDefault(); login(nicknameInput.value); });
    document.getElementById('switchUser').addEventListener('click', switchUser);

    // Apply persisted settings (e.g. dark mode) on load
    applySettings();

    // Auto-resume last player, else show login
    (function init() {
      let last = null;
      try { last = localStorage.getItem(STORAGE_CURRENT); } catch {}
      if (last && users[last]) login(last);
      else showLogin();
    })();
  </script>
</body>
</html>
